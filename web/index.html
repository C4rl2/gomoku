<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Gomoku</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/switch.css" />
  <link rel="stylesheet" href="css/game.css" />
</head>

<body>
  <div class="header">
    <div class="theme-switch-wrapper">
      <input type="checkbox" id="theme-toggle" aria-label="Toggle Dark/Light Mode" />
      <div class="toggle-switch" aria-hidden="true">
        <span class="toggle-switch__icon toggle-switch__icon--night">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M14.6 2.7c-1 1-1.6 2.5-1.6 4 0 3.2 2.6 5.8 5.8 5.8 1.1 0 2.1-.3 3-.8-.1 1.2-.5 2.4-1.2 3.5-1.5 2.4-4.1 3.8-6.9 3.8-4.5 0-8.2-3.7-8.2-8.2 0-4.2 3.1-7.6 7.1-8.1.7-.1 1.4-.1 2 .1z"
              fill="currentColor" />
          </svg>
        </span>
        <span class="toggle-switch__icon toggle-switch__icon--day">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="12" r="4.2" fill="currentColor" />
            <path
              d="M12 2.8v2.6M12 18.6v2.6M21.2 12h-2.6M5.4 12H2.8M18.5 5.5l-1.8 1.8M7.3 16.7l-1.8 1.8M18.5 18.5l-1.8-1.8M7.3 7.3 5.5 5.5"
              stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          </svg>
        </span>
      </div>
    </div>
  </div>


  <div id="content">
    <div id="setup" class="neo-sunken">
      <h2>Gomoku</h2>
      <label>AI depth (1-10): <input id="depth" type="number" min="1" max="10" value="5" /></label>
      <button id="start-btn" onclick="startGame()" disabled>Loading...</button>
    </div>
  </div>

  <div id="game" style="display:none">
    <aside class="game-sidebar game-sidebar--left">
      <div class="sidebar-card sidebar-card--placeholder">
        <h3>Player panel</h3>
        <p>Reserved for captures, turn order and game info.</p>
      </div>
    </aside>

    <section class="board-stage">
      <div class="board-shell">
        <div id="board" class="neo-board"></div>
      </div>
    </section>

    <aside class="game-sidebar game-sidebar--right">
      <div class="sidebar-card">
        <h3>Game panel</h3>
        <p id="status"></p>
        <p>Black captures: <span id="cap-black">0</span> &nbsp; White captures: <span id="cap-white">0</span></p>
        <p id="ai-time"></p>
      </div>
      <div class="sidebar-card sidebar-card--actions">
        <button onclick="location.reload()">New game</button>
      </div>
    </aside>
  </div>

  <script src="gomoku.js"></script>
  <script src="js/bridge.js"></script>
  <script src="js/render.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
