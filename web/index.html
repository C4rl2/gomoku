<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Gomoku</title>
</head>
<body>
  <div id="setup">
    <h2>Gomoku</h2>
    <label>AI depth (1-10): <input id="depth" type="number" min="1" max="10" value="5" /></label>
    <button id="start-btn" onclick="startGame()" disabled>Loading...</button>
  </div>

  <div id="game" style="display:none">
    <canvas id="board" style="cursor:crosshair; display:block"></canvas>
    <p id="status"></p>
    <p>Black captures: <span id="cap-black">0</span> &nbsp; White captures: <span id="cap-white">0</span></p>
    <p id="ai-time"></p>
    <button onclick="location.reload()">New game</button>
  </div>

  <script src="gomoku.js"></script>
  <script src="js/bridge.js"></script>
  <script src="js/render.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
